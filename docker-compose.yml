services:
  frogel-postgres:
    image: postgres:16
    container_name: frogel-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: frogel_dev
      POSTGRES_USER: frogel
      POSTGRES_PASSWORD: frogel

    ports:
      - "5433:5432"

    volumes:
      - frogel_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frogel -d frogel_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frogel_postgres_data: